<!DOCTYPE html>
<html>
<head>
  <title>Accessory Repair & Requirement Booking Portal</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/90D2Wsff/Screenshot-2026-04-15-075610.png">
  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        overflow: hidden; /* বাইরের স্ক্রলবার বন্ধ থাকবে, ভেতরেরটা কাজ করবে */
        background-color: #208e7b; /* পেজ লোড হওয়ার সময় ব্যাকগ্রাউন্ড কালার ম্যাচ করবে */
    }
    
    iframe {
        position: absolute;
        top: -28px; /* এটি গুগল স্ক্রিপ্টের ওপরের ব্যানারটিকে ঠিক ততটাই ওপরে তুলে লুকিয়ে দেবে */
        left: 0;
        width: 100%;
        height: calc(100% + 28px); /* নিচের অংশ যাতে কোনোভাবেই না কাটে তার জন্য হাইট ব্যালেন্স করা হলো */
        border: none;
        display: block;
    }
  </style>
</head>
