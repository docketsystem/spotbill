<!DOCTYPE html>
<html>
<head>
  <title>Accessory Repair Booking Portal</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/90D2Wsff/Screenshot-2026-04-15-075610.png">
  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100vh; 
        overflow: hidden; 
        background-color: #ffffff;
        font-family: "Segoe UI", sans-serif;
    }
    
    /* ================= LOADER STYLES ================= */
    #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-color: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.8s ease; /* একটু স্মুথলি ফেড আউট হওয়ার জন্য সময় বাড়ানো হলো */
    }
    
    .spinner {
        border: 4px solid rgba(32, 142, 123, 0.2);
        border-top: 4px solid #208e7b;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }
    
    .loading-text {
        color: #208e7b;
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 1px;
        animation: pulse 1.5s infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ================= IFRAME STYLES ================= */
    iframe {
        position: absolute;
        top: -28px; 
        left: 0;
        width: 100%;
        height: calc(100vh + 28px); 
        border: none;
        display: block;
        /* opacity সরিয়ে দেওয়া হয়েছে, এটি ব্যাকগ্রাউন্ডে লোড হয়ে রেডি হতে থাকবে */
    }
  </style>
</head>
<body>

  <div id="loader">
      <div class="spinner"></div>
      <div class="loading-text">Loading Portal...</div>
  </div>
  
  <iframe 
      id="portalFrame"
      src="https://script.google.com/macros/s/AKfycbyug98uxnBLo2nUvnR3E1U_w1e7ggAvjj8VUXm5ZFTHcqt1BDEWKxjoVgbbZZV2F8eT/exec"
      onload="handleIframeLoad()">
  </iframe>

  <script>
      let isLoaded = false;

      function hideLoader() {
          if (isLoaded) return;
          isLoaded = true;
          
          const loader = document.getElementById("loader");
          loader.style.opacity = "0";
          
          setTimeout(() => {
              loader.style.display = "none";
          }, 800); 
      }

      function handleIframeLoad() {
          // Iframe লোড হওয়ার পরও ভেতরের জাভাস্ক্রিপ্ট রান করে ফর্মগুলো গোছানোর জন্য ১ সেকেন্ড সময় দেওয়া হলো
          setTimeout(hideLoader, 1000);
      }

      // যদি গুগল স্ক্রিপ্ট সার্ভার ডাউন থাকে বা খুব বেশি সময় নেয়, 
      // তবে ম্যাক্সিমাম ৪.৫ সেকেন্ড পর অটোমেটিক লোডার সরে যাবে যাতে ইউজার আটকে না থাকে।
      setTimeout(hideLoader, 4500);
  </script>

</body>
</html>
