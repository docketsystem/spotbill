<!DOCTYPE html>
<html>
<head>
  <title>Accessory Repair Booking Portal</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/90D2Wsff/Screenshot-2026-04-15-075610.png">
  <style>
    body, html { 
        margin: 0; 
        padding: 0; 
        height: 100vh; 
        overflow: hidden; 
        background-color: #208e7b;
        font-family: "Segoe UI", sans-serif;
    }
    
    /* ================= LOADER STYLES ================= */
    #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-color: #208e7b; /* আপনার পোর্টালের থিম কালার */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
    }
    
    .spinner {
        border: 4px solid rgba(255, 215, 0, 0.2);
        border-top: 4px solid #FFD700;
        border-radius: 50%;
        width: 45px;
        height: 45px;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }
    
    .loading-text {
        color: #FFD700;
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 1px;
        animation: pulse 1.5s infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ================= IFRAME STYLES ================= */
    iframe {
        position: absolute;
        top: -28px; 
        left: 0;
        width: 100%;
        height: calc(100vh + 28px); 
        border: none;
        display: block;
        opacity: 0; /* লোড হওয়ার আগে লুকানো থাকবে */
        transition: opacity 0.8s ease; /* স্মুথলি ভেসে উঠবে */
    }
  </style>
</head>
<body>

  <div id="loader">
      <div class="spinner"></div>
      <div class="loading-text">Loading Portal...</div>
  </div>
  
  <iframe 
      id="portalFrame"
      src="https://script.google.com/macros/s/AKfycbyug98uxnBLo2nUvnR3E1U_w1e7ggAvjj8VUXm5ZFTHcqt1BDEWKxjoVgbbZZV2F8eT/exec"
      onload="hideLoader()">
  </iframe>

  <script>
      // পেজ পুরোপুরি লোড হওয়ার পর স্পিনার হাইড করে পোর্টাল দেখানোর ফাংশন
      function hideLoader() {
          document.getElementById("loader").style.opacity = "0";
          document.getElementById("portalFrame").style.opacity = "1";
          
          setTimeout(() => {
              document.getElementById("loader").style.display = "none";
          }, 500); // ফেড আউট অ্যানিমেশন শেষ হওয়ার পর পুরোপুরি মুছে ফেলা হবে
      }
  </script>

</body>
</html>
